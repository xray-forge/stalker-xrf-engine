name: coverage-and-nightly

on:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [24.x]
        shard: [1, 2, 3, 4, 5, 6]

    steps:
      - uses: actions/checkout@v6

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: "npm"

      - run: npm ci

      - name: Restore jest cache
        id: cache-jest-restore
        uses: actions/cache/restore@v5
        with:
          path: target/jest_cache
          key: jest-${{ hashFiles('**/package-lock.json') }}-${{ matrix.shard }}

      - run: npm run test:coverage -- --shard=${{ matrix.shard }}/${{ strategy.job-total }} --maxWorkers=100%

      - name: Save jest cache
        if: ${{ steps.cache-jest-restore.outputs.cache-hit != 'true' }}
        id: cache-jest-save
        uses: actions/cache/save@v5
        with:
          path: target/jest_cache
          key: ${{ steps.cache-jest-restore.outputs.cache-primary-key }}

      - run: mv target/coverage_report/coverage-final.json target/coverage_report/${{matrix.shard}}.json

      - uses: actions/upload-artifact@v7
        with:
          name: coverage-artifacts-${{matrix.shard}}
          path: target/coverage_report/${{matrix.shard}}.json

  report-coverage:
    runs-on: ubuntu-latest
    needs: [test]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/download-artifact@v8
        with:
          pattern: coverage-artifacts-*
          merge-multiple: true
          path: target/coverage_report

      - name: Merge code coverage
        run: npx nyc merge target/coverage_report/ target/coverage_report/coverage-final.json

      - name: Upload coverage reports to Codecov
        uses: codecov/codecov-action@v6
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
          files: ./target/coverage_report/coverage-final.json

  check:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [24.x]

    steps:
      - uses: actions/checkout@v6

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: "npm"

      - name: Fetch pinned xrf-cli tools
        shell: bash
        run: |
          submodule_commit="$(git rev-parse HEAD:cli/bin)"
          git clone --depth=1 --filter=blob:none --sparse https://github.com/xray-forge/stalker-xrf-bin.git cli/bin
          git -C cli/bin sparse-checkout set tools
          git -C cli/bin fetch --depth=1 origin "$submodule_commit"
          git -C cli/bin checkout --detach "$submodule_commit"

      - run: npm ci
      - run: npm run typecheck
      - run: npm run format:check
      - run: npm run lint
      - run: npm run cli format ltx -- --check
      - run: npm run cli verify ltx

  build-and-upload-nightly:
    needs: [test, check]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v6
        with:
          lfs: false

      - name: Use Node.js 24.x
        uses: actions/setup-node@v6
        with:
          node-version: 24.x
          cache: "npm"

      - name: Fetch pinned xrf-cli tools
        shell: bash
        run: |
          submodule_commit="$(git rev-parse HEAD:cli/bin)"
          git clone --depth=1 --filter=blob:none --sparse https://github.com/xray-forge/stalker-xrf-bin.git cli/bin
          git -C cli/bin sparse-checkout set tools
          git -C cli/bin fetch --depth=1 origin "$submodule_commit"
          git -C cli/bin checkout --detach "$submodule_commit"

      - name: Fetch pinned resource LFS pointers
        shell: bash
        env:
          GIT_LFS_SKIP_SMUDGE: "1"
        run: |
          git submodule update --init --depth=1 --single-branch src/resources

      - run: npm ci
      - run: npm run pack:mod -- --se

      - name: Archive nightly build
        working-directory: target/mod_package
        run: |
          mv ../xrf_build.log xrf_build.log
          mv ../README.md README.md
          zip -qq -r gamedata.release.zip gamedata/ bin/ xrf_build.log README.md

      - name: Update nightly tag
        uses: EndBug/latest-tag@latest
        id: update-nightly-tag
        with:
          ref: nightly

      - name: Publish nightly gamedata build
        if: ${{ steps.update-nightly-tag.outcome == 'success' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload --clobber nightly target/mod_package/gamedata.release.zip
